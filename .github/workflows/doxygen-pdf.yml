# .github/workflows/doxygen-pdf.yml
name: Generate Doxygen PDF

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            doxygen \
            graphviz \
            texlive-full \
            latexmk

      - name: Generate default Doxyfile if missing
        run: |
          if [ ! -f Doxyfile ]; then
            doxygen -g
          fi

      - name: Configure Doxyfile for PDF generation
        run: |
          sed -i 's/^GENERATE_LATEX.*/GENERATE_LATEX = YES/' Doxyfile
          sed -i 's/^GENERATE_HTML.*/GENERATE_HTML = NO/' Doxyfile
          sed -i 's/^USE_PDFLATEX.*/USE_PDFLATEX = YES/' Doxyfile

      - name: Run Doxygen
        run: doxygen Doxyfile

      - name: Build PDF
        run: |
          cd latex
          make

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-pdf
          path: latex/refman.pdf
